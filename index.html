<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Estate Insider's App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--navy-2:#132030;--navy-3:#1a2a3d;--navy-4:#223348;--amber:#e8a022;--amber-lt:#f0b540;--amber-bg:rgba(232,160,34,0.1);--amber-bd:rgba(232,160,34,0.28);--slate:#7d99b4;--slate-dk:#4e6a84;--white:#eef3f8;--white-60:rgba(238,243,248,0.6);--bdr:rgba(255,255,255,0.07);--bdr-md:rgba(255,255,255,0.13);--green:#3ecf8e;--green-bg:rgba(62,207,142,0.1);--green-bd:rgba(62,207,142,0.28);--red:#e05c5c;--red-bg:rgba(224,92,92,0.1);--red-bd:rgba(224,92,92,0.28);--teal-bg:rgba(62,180,207,0.1);--teal-bd:rgba(62,180,207,0.28);--teal:#3eb4cf;--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.1);--purple-bd:rgba(167,139,250,0.28);--orange:#f97316;--orange-bg:rgba(249,115,22,0.1);--orange-bd:rgba(249,115,22,0.28);--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.65;min-height:100vh}
.topbar{background:var(--navy-2);border-bottom:1px solid var(--bdr);padding:0 1rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--amber-bg);border:1px solid var(--amber-bd);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:13px;color:var(--amber)}
.brand-name{font-family:'DM Serif Display',serif;font-size:15px;color:var(--white)}
.topbar-tags{display:flex;gap:8px}
.tag{font-size:10px;padding:4px 10px;border-radius:100px}
.tag-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.search-box{background:var(--navy-2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.search-box h1{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px}
.search-box p{font-size:12px;color:var(--slate);margin-bottom:1rem}
.search-tabs{display:flex;gap:8px;margin-bottom:1rem}
.search-tab{background:var(--navy-3);border:1px solid var(--bdr-md);border-radius:var(--rs);padding:8px 16px;font-size:12px;color:var(--slate);cursor:pointer}
.search-tab:hover{border-color:var(--amber-bd);color:var(--amber)}
.search-tab.active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.search-tab.orange{color:var(--orange)}
.search-tab.orange:hover{border-color:var(--orange-bd);color:var(--orange)}
.search-tab.orange.active{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange)}
.search-panel{display:none}
.search-panel.active{display:block}
.search-row{display:flex;gap:10px}
.search-row input,.search-row select{flex:1;background:var(--navy-3);border:1px solid var(--bdr-md);border-radius:var(--rs);padding:10px 12px;font-size:14px;color:var(--white);outline:none}
.search-row input:focus,.search-row select:focus{border-color:var(--amber)}
.search-row input::placeholder{color:var(--slate-dk)}
.search-row button{background:var(--amber);border:none;border-radius:var(--rs);padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--navy);cursor:pointer;white-space:nowrap}
.search-row button:hover{background:var(--amber-lt)}
.search-row button.orange{background:var(--orange)}
.search-row button.orange:hover{background:#fb923c}
.arm-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.arm-row label{font-size:10px;color:var(--slate);text-transform:uppercase;margin-bottom:4px;display:block}
.arm-row select,.arm-row input{width:100%}
.loader{display:none;text-align:center;padding:3rem}
.loader.show{display:block}
.spinner{width:36px;height:36px;border:2px solid var(--bdr-md);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13px;color:var(--slate)}
.loader-step{font-size:11px;color:var(--slate-dk);margin-top:4px}
.err{display:none;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
.err.show{display:block}
.err strong{color:#f09090;font-size:13px}
.err span{color:#c07070;font-size:12px;display:block;margin-top:4px}
.results{display:none}
.results.show{display:block}
.arm-summary{background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r);padding:1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.arm-summary h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--orange)}
.arm-summary p{font-size:11px;color:var(--slate)}
.arm-stats{display:flex;gap:1.5rem}
.arm-stat{text-align:center}
.arm-stat .num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--white)}
.arm-stat .num.urgent{color:var(--red)}
.arm-stat .lbl{font-size:9px;color:var(--slate);text-transform:uppercase}
.btn-export{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--rs);padding:6px 12px;font-size:11px;color:var(--green);cursor:pointer}
.card{background:var(--navy-2);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.card.arm{border:2px solid var(--orange-bd)}
.card-head{padding:1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.card-addr{font-size:15px;font-weight:500;color:var(--white)}
.card-loc{font-size:12px;color:var(--slate);margin-top:2px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;padding:3px 8px;border-radius:100px}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.badge-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-slate{background:var(--navy-3);color:var(--slate);border:1px solid var(--bdr-md)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.card-body{display:none;border-top:1px solid var(--bdr);padding:1rem}
.card-body.open{display:block}
.arm-box{background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--rs);padding:1rem;margin-bottom:12px}
.arm-box h4{font-size:11px;color:var(--orange);text-transform:uppercase;margin-bottom:10px}
.arm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.arm-item{background:var(--navy-3);border-radius:var(--rs);padding:8px;text-align:center}
.arm-item .lbl{font-size:8px;color:var(--slate);text-transform:uppercase}
.arm-item .val{font-family:'DM Mono',monospace;font-size:12px;color:var(--orange);margin-top:2px}
.arm-item .val.urgent{color:var(--red)}
.arm-item .val.soon{color:var(--amber)}
.ai-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ai-tab{background:var(--navy-3);border:1px solid var(--bdr-md);border-radius:var(--rs);padding:7px 12px;font-size:11px;color:var(--slate);cursor:pointer}
.ai-tab:hover{border-color:var(--purple-bd);color:var(--purple)}
.ai-tab.active{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.ai-tab.orange.active{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange)}
.ai-panel{display:none}
.ai-panel.active{display:block}
.ai-box{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--r);padding:1rem;margin-bottom:12px}
.ai-box.orange{background:var(--orange-bg);border-color:var(--orange-bd)}
.ai-box-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-box-title.orange{color:var(--orange)}
.ai-content{font-size:13px;color:var(--white);line-height:1.7}
.ai-content strong{color:var(--purple)}
.ai-content.orange strong{color:var(--orange)}
.ai-content ul{margin:8px 0 8px 18px}
.ai-content li{margin-bottom:4px}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--slate);font-size:12px}
.ai-loading .spinner{width:18px;height:18px;margin:0}
.spinner.purple{border-top-color:var(--purple)}
.spinner.orange{border-top-color:var(--orange)}
.ai-chat{background:var(--navy-3);border:1px solid var(--purple-bd);border-radius:var(--r);overflow:hidden}
.ai-chat-head{background:var(--purple-bg);padding:8px 12px;font-size:11px;color:var(--purple);font-weight:500}
.ai-chat-msgs{max-height:200px;overflow-y:auto;padding:10px}
.chat-msg{margin-bottom:8px;padding:8px 10px;border-radius:var(--rs);font-size:12px;line-height:1.5}
.chat-msg.user{background:var(--navy-4);margin-left:20%}
.chat-msg.assistant{background:var(--purple-bg);margin-right:10%}
.quick-qs{display:flex;flex-wrap:wrap;gap:5px;margin:8px 10px}
.quick-q{background:var(--navy-4);border:1px solid var(--bdr-md);border-radius:100px;padding:4px 10px;font-size:10px;color:var(--slate);cursor:pointer}
.quick-q:hover{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.ai-chat-input{display:flex;gap:6px;padding:10px;border-top:1px solid var(--bdr)}
.ai-chat-input input{flex:1;background:var(--navy-4);border:1px solid var(--bdr-md);border-radius:var(--rs);padding:8px 10px;font-size:12px;color:var(--white)}
.ai-chat-input button{background:var(--purple);border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;color:var(--white);cursor:pointer}
.avm-box{background:var(--navy-3);border:1px solid var(--amber-bd);border-radius:var(--rs);padding:1rem;margin:12px 0;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.avm-val{font-family:'DM Serif Display',serif;font-size:26px;color:var(--amber)}
.avm-meta{font-size:11px;color:var(--slate);line-height:1.6}
.section-title{font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;margin:1rem 0 8px;padding-top:1rem;border-top:1px solid var(--bdr)}
.section-title.teal{color:var(--teal)}
.section-title.orange{color:var(--orange)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.detail-col h4{font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.detail-row{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--slate);min-width:100px}
.detail-val{color:var(--white);font-family:'DM Mono',monospace;font-size:11px}
.detail-val.hi{color:var(--amber)}
.detail-val.teal{color:var(--teal)}
.detail-val.green{color:var(--green)}
.comps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:10px}
.comp-card{background:var(--navy-3);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;position:relative}
.comp-card.subject{border-color:var(--amber-bd);background:var(--amber-bg)}
.comp-badge{position:absolute;top:8px;right:8px;font-size:8px;padding:2px 6px;border-radius:100px;text-transform:uppercase}
.comp-badge.subject{background:var(--amber);color:var(--navy)}
.comp-badge.comp{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.comp-addr{font-size:12px;font-weight:500;padding-right:50px;margin-bottom:8px}
.comp-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px}
.comp-stat-label{color:var(--slate)}
.comp-stat-val{color:var(--white);font-family:'DM Mono',monospace}
.comp-price{font-family:'DM Serif Display',serif;font-size:18px;color:var(--orange);margin-top:8px}
.comp-price.subject{color:var(--amber)}
.links{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.link{display:inline-flex;align-items:center;gap:4px;background:var(--teal-bg);border:1px solid var(--teal-bd);border-radius:var(--rs);padding:4px 10px;font-size:10px;color:var(--teal);text-decoration:none}
.link.amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.footer{text-align:center;font-size:10px;color:var(--slate-dk);margin-top:2rem}
@media(max-width:600px){.detail-grid,.comps-grid{grid-template-columns:1fr}.search-row{flex-direction:column}.search-row button{width:100%}.arm-row{grid-template-columns:1fr}.arm-stats{flex-direction:column;gap:.5rem}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="brand-icon">RE</div><div class="brand-name">Real Estate Insider's</div></div>
  <div class="topbar-tags"><span class="tag tag-purple">🤖 AI</span><span class="tag tag-orange">🔥 ARM</span><span class="tag tag-green">● Live</span></div>
</div>
<div class="page">
  <div class="search-box">
    <h1>Property Search</h1>
    <p>AI-powered property analysis, comps & ARM finder for 150M+ US properties</p>
    <div class="search-tabs">
      <div class="search-tab active" onclick="switchSearch('address')">🔍 Address</div>
      <div class="search-tab orange" onclick="switchSearch('arm')">🔥 ARM Search</div>
    </div>
    <div class="search-panel active" id="panel-address">
      <div class="search-row">
        <input type="text" id="addr" placeholder="Enter address (e.g. 123 Main St, Los Angeles, CA)">
        <button onclick="search()">🔍 Search</button>
      </div>
    </div>
    <div class="search-panel" id="panel-arm">
      <div class="arm-row">
        <div><label>ZIP Code</label><input type="text" id="arm-zip" placeholder="85001"></div>
        <div><label>Reset Within</label><select id="arm-months"><option value="6">6 months</option><option value="12" selected>12 months</option><option value="24">24 months</option><option value="60">5 years</option></select></div>
        <div><label>Max Results</label><select id="arm-max"><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option></select></div>
      </div>
      <div class="search-row">
        <button class="orange" onclick="searchARM()" style="width:100%">🔥 Find ARMs in ZIP</button>
      </div>
    </div>
  </div>
  <div class="loader" id="loader"><div class="spinner"></div><p>Searching ATTOM...</p><div class="loader-step" id="step"></div></div>
  <div class="err" id="err"><strong id="err-t"></strong><span id="err-m"></span></div>
  <div class="results" id="results"><div id="arm-summary"></div><div id="cards"></div></div>
  <div class="footer">Data by ATTOM · AI by Claude · For informational use only</div>
</div>
<script>
var ATTOM='https://api.gateway.attomdata.com',KEY='12d7df12ef42429a5db72ff39a01493a',PROXY='https://real-estate-insiders-app-production.up.railway.app';
var propData=null,compsData=[],chats={},allARMResults=[];

// ARM detection
var ARM_KEYWORDS=['ARM','ADJUSTABLE','VARIABLE','ADJ','LIBOR','SOFR','INDEX','HYBRID'];
var ARM_CODES=['A','ARM','ADJ','V','VAR','2','3'];
var ARM_PERIODS={'3/1':3,'3/6':3,'5/1':5,'5/6':5,'7/1':7,'7/6':7,'10/1':10,'10/6':10};

function $(id){return document.getElementById(id)}
function show(id,yes){$(id).className=$(id).className.split(' ')[0]+(yes?' show':'');}
function step(t){$('step').textContent=t;}

function switchSearch(t){
  document.querySelectorAll('.search-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.search-panel').forEach(x=>x.classList.remove('active'));
  document.querySelector('.search-tab'+(t==='arm'?'.orange':':not(.orange)')).classList.add('active');
  $('panel-'+t).classList.add('active');
}

function api(path,params){
  var url=PROXY+'/p?u='+encodeURIComponent(ATTOM+path+'?'+new URLSearchParams(params))+'&key='+KEY;
  return fetch(url,{headers:{apikey:KEY,Accept:'application/json'}}).then(r=>r.json()).then(d=>{
    if(d.status&&d.status.code&&d.status.code!==0)throw new Error(d.status.msg);
    return d;
  });
}

async function ai(msgs,sys){
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,messages:msgs})
  });
  var d=await r.json();
  return d.content?.[0]?.text||'Error';
}

function detectARM(m){
  if(!m)return null;
  var text=[m.loantype,m.loantypecode,m.loanType,m.loanTypeCode,m.ratetype,m.rateType,m.interestratetype,m.interestRateType,m.loantypedescription,m.loanTypeDescription].filter(Boolean).join(' ').toUpperCase();
  var isARM=ARM_KEYWORDS.some(kw=>text.includes(kw));
  var code=String(m.loantypecode||m.loanTypeCode||'').toUpperCase().trim();
  if(ARM_CODES.includes(code))isARM=true;
  if(!isARM)return null;
  var armType='5/1 ARM';
  for(var t in ARM_PERIODS){if(text.includes(t)||text.includes(t.replace('/','')))armType=t+' ARM';}
  var origDate=m.recordingdate||m.recordingDate||m.deedoftrustdate||m.documentdate||m.documentDate||m.originationdate;
  var resetDate=null,daysUntil=null;
  if(origDate){
    var orig=new Date(origDate);
    if(!isNaN(orig)){
      var years=5;
      for(var t in ARM_PERIODS){if(text.includes(t)){years=ARM_PERIODS[t];break;}}
      resetDate=new Date(orig);
      resetDate.setFullYear(resetDate.getFullYear()+years);
      daysUntil=Math.ceil((resetDate-new Date())/(1000*60*60*24));
    }
  }
  return{isARM:true,armType,loanAmount:m.amount||m.loanamount||m.loanAmount,lender:m.lendername||m.lenderName||'',originationDate:origDate,resetDate,daysUntilReset:daysUntil};
}

function checkPropertyARM(p){
  var mort=p.mortgage||{};
  return detectARM(mort.first)||detectARM(mort.second)||detectARM(mort);
}

async function searchARM(){
  var zip=$('arm-zip').value.trim();
  if(!zip||!/^\d{5}$/.test(zip)){$('err-t').textContent='Invalid ZIP';$('err-m').textContent='Enter a 5-digit ZIP code';show('err',true);return;}
  var months=parseInt($('arm-months').value)||12;
  var maxResults=parseInt($('arm-max').value)||50;
  show('err',false);show('results',false);show('loader',true);step('Searching ZIP '+zip+'...');
  allARMResults=[];
  try{
    var d=await api('/propertyapi/v1.0.0/property/detailmortgage',{postalcode:zip,pagesize:maxResults});
    var props=(d.property||[]).flat().filter(Boolean);
    if(!props.length)throw new Error('No mortgage data in ZIP '+zip);
    step('Analyzing '+props.length+' properties...');
    var now=new Date(),cutoff=new Date();
    cutoff.setMonth(cutoff.getMonth()+months);
    var armProps=[];
    props.forEach(p=>{
      var arm=checkPropertyARM(p);
      if(arm){
        p._armInfo=arm;
        if(arm.resetDate&&arm.resetDate>=now&&arm.resetDate<=cutoff)armProps.push(p);
        else if(!arm.resetDate)armProps.push(p);
      }
    });
    if(!armProps.length)throw new Error('No ARMs found in ZIP '+zip+' resetting within '+months+' months');
    armProps.sort((a,b)=>{
      var da=a._armInfo?.daysUntilReset,db=b._armInfo?.daysUntilReset;
      if(da===null)return 1;if(db===null)return -1;return da-db;
    });
    show('loader',false);
    allARMResults=armProps;
    renderARMResults(armProps);
  }catch(e){
    show('loader',false);
    $('err-t').textContent='Error';
    $('err-m').textContent=e.message;
    show('err',true);
  }
}

function renderARMResults(props){
  var urgentCount=0,soonCount=0;
  props.forEach(p=>{
    var d=p._armInfo?.daysUntilReset;
    if(d!==null&&d>=0){if(d<=90)urgentCount++;else if(d<=365)soonCount++;}
  });
  var summaryHtml='<div class="arm-summary"><div><h3>🔥 '+props.length+' ARM'+(props.length>1?'s':'')+' Found</h3><p>Sorted by reset date</p></div><div class="arm-stats">';
  if(urgentCount>0)summaryHtml+='<div class="arm-stat"><div class="num urgent">'+urgentCount+'</div><div class="lbl">≤90 days</div></div>';
  if(soonCount>0)summaryHtml+='<div class="arm-stat"><div class="num">'+soonCount+'</div><div class="lbl">≤1 year</div></div>';
  summaryHtml+='<div class="arm-stat"><div class="num">'+props.length+'</div><div class="lbl">Total</div></div></div><button class="btn-export" onclick="exportCSV()">📥 Export</button></div>';
  $('arm-summary').innerHTML=summaryHtml;
  var html='';
  props.forEach((p,i)=>html+=buildARMCard(p,i));
  $('cards').innerHTML=html;
  show('results',true);
}

function buildARMCard(p,idx){
  var a=p.address||{},arm=p._armInfo,mort=p.mortgage||{};
  var street=a.line1||a.oneLine||'—';
  var loc=[a.locality,a.countrySubd,a.postal1].filter(Boolean).join(', ');
  var urg=arm.daysUntilReset!==null&&arm.daysUntilReset<=90?'urgent':arm.daysUntilReset!==null&&arm.daysUntilReset<=365?'soon':'';
  var label=arm.armType;
  if(arm.daysUntilReset!==null){
    if(arm.daysUntilReset<=0)label+=' RESET';
    else if(arm.daysUntilReset<=90)label+=' · '+arm.daysUntilReset+'d';
    else if(arm.daysUntilReset<=365)label+=' · '+Math.ceil(arm.daysUntilReset/30)+'mo';
  }
  var html='<div class="card arm"><div class="card-head" onclick="toggleCard('+idx+')"><div><div class="card-addr">'+street+'</div><div class="card-loc">'+loc+'</div></div><div class="card-badges"><span class="badge badge-orange">🔥 '+label+'</span></div></div>';
  html+='<div class="card-body" id="body-'+idx+'">';
  html+='<div class="arm-box"><h4>🔥 ARM Details</h4><div class="arm-grid">';
  html+='<div class="arm-item"><div class="lbl">Type</div><div class="val">'+arm.armType+'</div></div>';
  if(arm.loanAmount)html+='<div class="arm-item"><div class="lbl">Amount</div><div class="val">'+money(arm.loanAmount)+'</div></div>';
  if(arm.originationDate)html+='<div class="arm-item"><div class="lbl">Originated</div><div class="val">'+date(arm.originationDate)+'</div></div>';
  if(arm.resetDate)html+='<div class="arm-item"><div class="lbl">Est. Reset</div><div class="val '+urg+'">'+date(arm.resetDate)+'</div></div>';
  if(arm.daysUntilReset!==null)html+='<div class="arm-item"><div class="lbl">Days Left</div><div class="val '+urg+'">'+(arm.daysUntilReset<=0?'PASSED':arm.daysUntilReset)+'</div></div>';
  if(arm.lender)html+='<div class="arm-item"><div class="lbl">Lender</div><div class="val" style="font-size:9px;color:var(--white)">'+arm.lender+'</div></div>';
  html+='</div></div>';
  html+='</div></div>';
  return html;
}

function exportCSV(){
  if(!allARMResults.length)return;
  var rows=[['Address','City','State','ZIP','ARM_Type','Loan_Amount','Lender','Reset_Date','Days_Until_Reset'].join(',')];
  allARMResults.forEach(p=>{
    var a=p.address||{},arm=p._armInfo||{};
    rows.push([esc(a.line1||a.oneLine||''),esc(a.locality||''),esc(a.countrySubd||''),esc(a.postal1||''),esc(arm.armType||''),arm.loanAmount||'',esc(arm.lender||''),arm.resetDate?arm.resetDate.toISOString().split('T')[0]:'',arm.daysUntilReset!==null?arm.daysUntilReset:''].join(','));
  });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var x=document.createElement('a');x.href=URL.createObjectURL(blob);x.download='arm_properties.csv';x.click();
}

function esc(v){if(v==null)return'';var s=String(v);return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;}

async function search(){
  var addr=$('addr').value.trim();
  if(!addr)return alert('Enter an address');
  show('err',false);show('results',false);show('loader',true);step('Finding property...');
  $('arm-summary').innerHTML='';
  try{
    var d=await api('/propertyapi/v1.0.0/property/basicprofile',{address:addr});
    var p=(d.property||[]).flat()[0];
    if(!p)throw new Error('Property not found');
    var id=p.identifier?.attomId;
    step('Getting mortgage & deed...');
    var d2=await api('/propertyapi/v1.0.0/property/detailmortgage',{attomId:id}).catch(()=>null);
    step('Getting owner & AVM...');
    var [d3,d4]=await Promise.all([
      api('/propertyapi/v1.0.0/property/detailowner',{attomId:id}).catch(()=>null),
      api('/propertyapi/v1.0.0/attomavm/detail',{attomId:id}).catch(()=>null)
    ]);
    step('Getting history...');
    var d5=await api('/propertyapi/v1.0.0/saleshistory/detail',{attomId:id}).catch(()=>null);
    step('Finding comps...');
    var zip=p.address?.postal1;
    var d6=zip?await api('/propertyapi/v1.0.0/sale/snapshot',{postalcode:zip,orderby:'saletransdate desc',pagesize:8}).catch(()=>null):null;
    
    var final=Object.assign({},p,d2?.property?.[0]||{});
    if(d3?.property?.[0]?.owner)final.owner=d3.property[0].owner;
    if(d4?.property?.[0])final._avm=d4.property[0];
    if(d5?.property?.[0])final._hist=d5.property[0];
    if(d6?.property)final._comps=d6.property.slice(0,6);
    final._armInfo=checkPropertyARM(final);
    
    show('loader',false);
    render(final);
  }catch(e){
    show('loader',false);
    $('err-t').textContent='Error';
    $('err-m').textContent=e.message;
    show('err',true);
  }
}

function fmt(v){return v&&v!=='N/A'&&v!==''&&v!==0?v:'—';}
function money(v){var n=parseInt(v);return n&&!isNaN(n)?'$'+n.toLocaleString():'—';}
function date(v){if(!v)return'—';var d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
function row(l,v,c){return'<div class="detail-row"><span class="detail-label">'+l+'</span><span class="detail-val'+(c?' '+c:'')+'">'+fmt(v)+'</span></div>';}

function render(p){
  var a=p.address||{},b=p.building||{},s=p.sale||{},m=p.mortgage||{},as=p.assessment||{},o=p.owner||{},av=p._avm||{},h=p._hist||{},c=p._comps||[],armInfo=p._armInfo;
  var street=fmt(a.line1||a.oneLine),city=fmt(a.locality),st=fmt(a.countrySubd),zip=fmt(a.postal1);
  var loc=[city,st,zip].filter(x=>x!=='—').join(', ');
  var county=fmt(p.area?.countrysecsubd);
  var type=fmt(p.summary?.proptype);
  var yr=fmt(b.yearbuilt||(b.summary?.yearBuilt));
  var sqft=fmt(b.size?.universalsize||b.size?.livingsize);
  var beds=fmt(b.rooms?.beds),baths=fmt(b.rooms?.bathstotal||b.rooms?.bathsfull);
  var lot=fmt(p.lot?.lotsize1);
  var apn=fmt(p.summary?.apn||p.identifier?.apn);
  var owner=fmt(o.owner1?.fullname||o.owner1fullname||o.fullname);
  var occ=o.absenteeind==='O'?'Yes':o.absenteeind==='A'?'No':'—';
  var sa=s.amount||{};
  var saleAmt=money(sa.saleamt||s.saleamt);
  var saleDt=date(sa.saletransdate||s.saletransdate);
  var asmtVal=money(as.assessed?.assdttlvalue);
  var tax=money(as.tax?.taxamt);
  var avmVal=money(av.avm?.amount?.value);
  var avmLo=money(av.avm?.amount?.low);
  var avmHi=money(av.avm?.amount?.high);
  var mortAmt='—',mortRate='—',lender='—';
  if(m.first){
    mortAmt=money(m.first.amount||m.first.loanamount);
    var ir=m.first.interestrate||m.first.interestRate;
    mortRate=ir?parseFloat(ir).toFixed(3)+'%':'—';
    var lr=m.first.lender||{};
    lender=typeof lr==='string'?fmt(lr):fmt(m.first.lendername||lr.fullname||lr.name);
  }
  
  propData={address:street,loc,county,type,year:yr,sqft,beds,baths,lot,apn,owner,occ,saleAmt,saleDt,asmtVal,tax,avmVal,avmLo,avmHi,mortAmt,mortRate,lender};
  compsData=c.map(x=>{
    var ca=x.address||{},cs=x.sale?.amount||x.sale||{},cb=x.building||{};
    return{addr:ca.line1||'',city:ca.locality||'',price:parseInt(cs.saleamt)||0,sqft:parseInt(cb.size?.universalsize)||0,beds:cb.rooms?.beds||0,baths:cb.rooms?.bathstotal||0,dt:date(cs.saletransdate||x.saletransdate)};
  }).filter(x=>x.price>0);

  var isARM=armInfo&&armInfo.isARM;
  var badges='<span class="badge badge-purple">🤖 AI</span><span class="badge badge-orange">📊 Comps</span>';
  if(isARM){
    var label=armInfo.armType;
    if(armInfo.daysUntilReset!==null&&armInfo.daysUntilReset<=90)label+=' · '+armInfo.daysUntilReset+'d';
    badges='<span class="badge badge-orange">🔥 '+label+'</span>'+badges;
  }
  if(type!=='—')badges+='<span class="badge badge-slate">'+type+'</span>';

  var html='<div class="card'+(isARM?' arm':'')+'"><div class="card-head" onclick="toggleCard(0)"><div><div class="card-addr">'+street+'</div><div class="card-loc">'+loc+(county!=='—'?' · '+county:'')+'</div></div><div class="card-badges">'+badges+'</div></div>';
  html+='<div class="card-body" id="body-0">';
  
  // ARM box if detected
  if(isARM){
    var urg=armInfo.daysUntilReset!==null&&armInfo.daysUntilReset<=90?'urgent':armInfo.daysUntilReset!==null&&armInfo.daysUntilReset<=365?'soon':'';
    html+='<div class="arm-box"><h4>🔥 Adjustable Rate Mortgage Detected</h4><div class="arm-grid">';
    html+='<div class="arm-item"><div class="lbl">Type</div><div class="val">'+armInfo.armType+'</div></div>';
    if(armInfo.loanAmount)html+='<div class="arm-item"><div class="lbl">Amount</div><div class="val">'+money(armInfo.loanAmount)+'</div></div>';
    if(armInfo.originationDate)html+='<div class="arm-item"><div class="lbl">Originated</div><div class="val">'+date(armInfo.originationDate)+'</div></div>';
    if(armInfo.resetDate)html+='<div class="arm-item"><div class="lbl">Est. Reset</div><div class="val '+urg+'">'+date(armInfo.resetDate)+'</div></div>';
    if(armInfo.daysUntilReset!==null)html+='<div class="arm-item"><div class="lbl">Days Left</div><div class="val '+urg+'">'+(armInfo.daysUntilReset<=0?'PASSED':armInfo.daysUntilReset)+'</div></div>';
    if(armInfo.lender)html+='<div class="arm-item"><div class="lbl">Lender</div><div class="val" style="font-size:9px;color:var(--white)">'+armInfo.lender+'</div></div>';
    html+='</div></div>';
  }
  
  // AI Tabs
  html+='<div class="ai-tabs"><div class="ai-tab active" onclick="tab(0,\'insights\')">🤖 AI Insights</div><div class="ai-tab orange" onclick="tab(0,\'comps\')">📊 Comps</div><div class="ai-tab" onclick="tab(0,\'chat\')">💬 Chat</div></div>';
  
  // Insights Panel
  html+='<div class="ai-panel active" id="panel-insights-0"><div class="ai-box"><div class="ai-box-title">🤖 AI Property Analysis</div><div id="ai-0"><div class="ai-loading"><div class="spinner purple"></div>Analyzing...</div></div></div></div>';
  
  // Comps Panel
  html+='<div class="ai-panel" id="panel-comps-0"><div class="ai-box orange"><div class="ai-box-title orange">📊 AI Comps Analysis</div><div id="comps-ai-0"><div class="ai-loading"><div class="spinner orange"></div>Analyzing comps...</div></div></div>';
  if(compsData.length){
    html+='<div class="section-title orange">Comparables ('+compsData.length+')</div><div class="comps-grid">';
    html+='<div class="comp-card subject"><span class="comp-badge subject">Subject</span><div class="comp-addr">'+street+'</div><div class="comp-stats"><div><span class="comp-stat-label">Sqft</span><div class="comp-stat-val">'+sqft+'</div></div><div><span class="comp-stat-label">Bed/Bath</span><div class="comp-stat-val">'+beds+'/'+baths+'</div></div></div><div class="comp-price subject">'+avmVal+'</div></div>';
    compsData.slice(0,4).forEach((x,i)=>{
      var pp=x.sqft>0?Math.round(x.price/x.sqft):0;
      html+='<div class="comp-card"><span class="comp-badge comp">Comp '+(i+1)+'</span><div class="comp-addr">'+x.addr+'</div><div class="comp-stats"><div><span class="comp-stat-label">Sqft</span><div class="comp-stat-val">'+(x.sqft||'—')+'</div></div><div><span class="comp-stat-label">$/Sqft</span><div class="comp-stat-val">$'+pp+'</div></div></div><div class="comp-price">$'+x.price.toLocaleString()+'</div></div>';
    });
    html+='</div>';
  }
  html+='</div>';
  
  // Chat Panel
  html+='<div class="ai-panel" id="panel-chat-0"><div class="ai-chat"><div class="ai-chat-head">💬 Ask AI</div><div class="ai-chat-msgs" id="msgs-0"><div class="chat-msg assistant">Ask me anything about this property!</div></div><div class="quick-qs"><span class="quick-q" onclick="ask(0,\'Good investment?\')">Investment?</span><span class="quick-q" onclick="ask(0,\'Red flags?\')">Red flags?</span><span class="quick-q" onclick="ask(0,\'Rental estimate?\')">Rental?</span><span class="quick-q" onclick="ask(0,\'Compare to comps\')">Comps?</span></div><div class="ai-chat-input"><input id="chat-0" placeholder="Ask..." onkeydown="if(event.key===\'Enter\')send(0)"><button onclick="send(0)">Send</button></div></div></div>';
  
  // AVM
  if(avmVal!=='—')html+='<div class="avm-box"><div><div style="font-size:10px;color:var(--slate);margin-bottom:4px">ATTOM AVM</div><div class="avm-val">'+avmVal+'</div></div><div class="avm-meta">Range: '+avmLo+' — '+avmHi+'</div></div>';
  
  // Details
  html+='<div class="section-title">Property Details</div><div class="detail-grid"><div class="detail-col"><h4>Building</h4>'+row('APN',apn)+row('Type',type)+row('Year',yr)+row('Sqft',sqft)+row('Beds/Baths',beds+'/'+baths)+'</div><div class="detail-col"><h4>Location</h4>'+row('County',county)+row('Lot',lot)+row('Owner',owner)+row('Occupied',occ)+'</div></div>';
  html+='<div class="section-title">Sale & Taxes</div>'+row('Last Sale',saleAmt,'hi')+row('Date',saleDt,'teal')+row('Assessed',asmtVal)+row('Tax/Yr',tax,'hi');
  
  // Mortgage
  if(mortAmt!=='—')html+='<div class="section-title teal">Mortgage</div>'+row('Lender',lender,'teal')+row('Amount',mortAmt,'hi')+row('Rate',mortRate,'green');
  
  // Links
  var lat=p.location?.latitude,lng=p.location?.longitude;
  html+='<div class="section-title">Links</div><div class="links">';
  if(county!=='—')html+='<a class="link amber" href="https://www.google.com/search?q='+encodeURIComponent(county+' '+st+' county recorder')+'" target="_blank">🔍 Recorder</a>';
  if(lat)html+='<a class="link" href="https://maps.google.com/?q='+lat+','+lng+'" target="_blank">📍 Map</a>';
  html+='<a class="link" href="https://www.zillow.com/homes/'+encodeURIComponent(street+' '+loc)+'_rb/" target="_blank">🏠 Zillow</a></div>';
  
  html+='</div></div>';
  $('cards').innerHTML=html;
  show('results',true);
  setTimeout(()=>{toggleCard(0);runAI(0);runCompsAI(0);},100);
}

function toggleCard(i){$('body-'+i).classList.toggle('open');}

function tab(i,t){
  document.querySelectorAll('.ai-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.ai-panel').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
  $('panel-'+t+'-'+i).classList.add('active');
}

async function runAI(i){
  var d=$('ai-'+i);
  var sys="You are a real estate analyst. Give concise insights: investment potential, red flags, opportunities, recommendations. Use HTML (p, strong, ul, li). Under 180 words.";
  var msg="Analyze: "+propData.address+", "+propData.loc+". Type: "+propData.type+", Year: "+propData.year+", "+propData.sqft+" sqft, "+propData.beds+"bd/"+propData.baths+"ba. AVM: "+propData.avmVal+". Last sale: "+propData.saleAmt+" ("+propData.saleDt+"). Tax: "+propData.tax+"/yr. Mortgage: "+propData.mortAmt+" @ "+propData.mortRate+". Owner occupied: "+propData.occ;
  try{
    var r=await ai([{role:'user',content:msg}],sys);
    d.innerHTML='<div class="ai-content">'+r+'</div>';
  }catch(e){d.innerHTML='<span style="color:var(--red)">AI unavailable</span>';}
}

async function runCompsAI(i){
  var d=$('comps-ai-'+i);
  if(!compsData.length){d.innerHTML='<span style="color:var(--slate)">No comps found</span>';return;}
  var sys="You are a real estate appraiser. Analyze comps, give price opinion with value range, $/sqft analysis, confidence level. Use HTML. Under 200 words.";
  var comp=compsData.map((c,j)=>"Comp"+(j+1)+": "+c.addr+" $"+c.price.toLocaleString()+", "+c.sqft+"sqft, "+c.beds+"bd").join(". ");
  var msg="Subject: "+propData.address+", "+propData.sqft+"sqft, "+propData.beds+"bd/"+propData.baths+"ba. AVM: "+propData.avmVal+". Comps: "+comp;
  try{
    var r=await ai([{role:'user',content:msg}],sys);
    d.innerHTML='<div class="ai-content orange">'+r+'</div>';
  }catch(e){d.innerHTML='<span style="color:var(--red)">AI unavailable</span>';}
}

function ask(i,q){$('chat-'+i).value=q;send(i);}

async function send(i){
  var inp=$('chat-'+i),m=$('msgs-'+i);
  var q=inp.value.trim();if(!q)return;
  if(!chats[i])chats[i]=[];
  m.innerHTML+='<div class="chat-msg user">'+q+'</div>';
  inp.value='';
  chats[i].push({role:'user',content:q});
  m.innerHTML+='<div class="chat-msg assistant" id="thinking-'+i+'"><em>Thinking...</em></div>';
  m.scrollTop=m.scrollHeight;
  var sys="Real estate assistant. Property: "+JSON.stringify(propData)+". Comps: "+JSON.stringify(compsData.slice(0,3))+". Be concise (<100 words). Use HTML if helpful.";
  try{
    var r=await ai(chats[i],sys);
    chats[i].push({role:'assistant',content:r});
    $('thinking-'+i).remove();
    m.innerHTML+='<div class="chat-msg assistant">'+r+'</div>';
  }catch(e){
    $('thinking-'+i).remove();
    m.innerHTML+='<div class="chat-msg assistant" style="color:var(--red)">Error</div>';
  }
  m.scrollTop=m.scrollHeight;
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===$('addr'))search();});
</script>
